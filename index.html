/* =========================================================
   EXCEL WORKBOOK IMPORT (SheetJS) — robust .xlsx/.xlsm
   Matches VBA column layout for Muniru/Zola workbook
   ========================================================= */
let _xlsxLoading = null;
function loadSheetJS(){
  if(window.XLSX) return Promise.resolve(window.XLSX);
  if(_xlsxLoading) return _xlsxLoading;
  _xlsxLoading = new Promise((resolve, reject)=>{
    const urls = [
      'https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js',
      'https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js',
      'https://unpkg.com/xlsx@0.18.5/dist/xlsx.full.min.js'
    ];
    let i = 0;
    const tryNext = ()=>{
      if(i >= urls.length){ reject(new Error('Could not load SheetJS. Connect to internet once, then retry import.')); return; }
      const s = document.createElement('script');
      s.src = urls[i++];
      s.onload = ()=> window.XLSX ? resolve(window.XLSX) : tryNext();
      s.onerror = tryNext;
      document.head.appendChild(s);
    };
    tryNext();
  });
  return _xlsxLoading;
}

/** Find sheet by exact, case-insensitive, or partial name match */
function findSheetName(wb, candidates){
  const names = wb.SheetNames || [];
  const lowerMap = names.map(n => ({ raw: n, low: n.toLowerCase().replace(/\s+/g,' ').trim() }));
  for(const want of candidates){
    const w = want.toLowerCase().replace(/\s+/g,' ').trim();
    const exact = lowerMap.find(x => x.low === w);
    if(exact) return exact.raw;
  }
  for(const want of candidates){
    const w = want.toLowerCase().replace(/\s+/g,' ').trim();
    const part = lowerMap.find(x => x.low.includes(w) || w.includes(x.low));
    if(part) return part.raw;
  }
  return null;
}

function getMatrix(wb, candidates){
  const name = findSheetName(wb, candidates);
  if(!name) return null;
  const ws = wb.Sheets[name];
  // raw:true keeps numbers; blankrows false
  const matrix = XLSX.utils.sheet_to_json(ws, { header: 1, defval: null, raw: true, blankrows: false });
  return { name, ws, matrix };
}

function cellStr(v){
  if(v === null || v === undefined) return '';
  if(typeof v === 'string') return v.trim();
  if(typeof v === 'number' && !isNaN(v)) return String(v);
  if(v instanceof Date) return v.toISOString();
  return String(v).trim();
}
function cellNum(v){
  if(v === null || v === undefined || v === '') return 0;
  if(typeof v === 'number' && !isNaN(v)) return v;
  if(v instanceof Date) return 0;
  let s = String(v).trim();
  if(!s) return 0;
  // strip currency / spaces
  s = s.replace(/GH[S₵¢]?/gi,'').replace(/,/g,'').replace(/\s/g,'').replace(/[^\d.\-eE+]/g,'');
  const n = parseFloat(s);
  return isNaN(n) ? 0 : n;
}
function excelSerialToDate(v){
  if(v instanceof Date && !isNaN(v.getTime())) return v;
  if(typeof v === 'number' && v > 20000 && v < 80000){
    // Excel serial (1900 system)
    const utc = Math.round((v - 25569) * 86400 * 1000);
    return new Date(utc);
  }
  if(typeof v === 'string' && v.trim()){
    const d = new Date(v);
    if(!isNaN(d.getTime())) return d;
  }
  return null;
}
function excelDateToISO(v){
  const d = excelSerialToDate(v);
  return d ? d.toISOString() : nowISO();
}
function monthFromValue(v){
  if(v === null || v === undefined || v === '') return 0;
  if(typeof v === 'number'){
    if(v >= 1 && v <= 12) return Math.floor(v);
    // sometimes month stored as date serial
    const d = excelSerialToDate(v);
    if(d) return d.getMonth()+1;
    return 0;
  }
  const s = String(v).trim();
  if(/^\d{1,2}$/.test(s)){ const n=+s; return (n>=1&&n<=12)?n:0; }
  const names = ['january','february','march','april','may','june','july','august','september','october','november','december'];
  const low = s.toLowerCase();
  for(let i=0;i<12;i++){
    if(low.startsWith(names[i].slice(0,3)) || names[i].startsWith(low.slice(0,3))) return i+1;
  }
  const d = excelSerialToDate(v);
  if(d) return d.getMonth()+1;
  return 0;
}
function yearFromValue(v){
  if(v === null || v === undefined || v === '') return 0;
  if(typeof v === 'number'){
    if(v >= 2000 && v <= 2100) return Math.floor(v);
    if(v > 20000 && v < 80000){
      const d = excelSerialToDate(v);
      return d ? d.getFullYear() : 0;
    }
    return 0;
  }
  const s = String(v).trim();
  if(/^\d{4}$/.test(s)) return +s;
  const d = excelSerialToDate(v);
  return d ? d.getFullYear() : 0;
}

/** Detect header row index by looking for known header labels in a row */
function findHeaderRow(matrix, mustHaveAny){
  const maxScan = Math.min(matrix.length, 15);
  for(let r=0; r<maxScan; r++){
    const row = matrix[r] || [];
    const labels = row.map(c => cellStr(c).toLowerCase());
    const joined = labels.join(' | ');
    let hits = 0;
    for(const h of mustHaveAny){
      if(labels.some(l => l === h || l.includes(h))) hits++;
    }
    if(hits >= 2) return r;
  }
  return 0; // assume first row headers
}

/** Map header labels → column index */
function mapHeaders(headerRow){
  const map = {};
  (headerRow||[]).forEach((h,i)=>{
    const k = cellStr(h).toLowerCase().replace(/\s+/g,' ').trim();
    if(k) map[k] = i;
  });
  return map;
}
function colIndex(map, candidates, fallbackLetter){
  for(const c of candidates){
    const k = c.toLowerCase().replace(/\s+/g,' ').trim();
    if(map[k] !== undefined) return map[k];
  }
  // partial
  for(const c of candidates){
    const k = c.toLowerCase().replace(/\s+/g,' ').trim();
    for(const key of Object.keys(map)){
      if(key.includes(k) || k.includes(key)) return map[key];
    }
  }
  // Excel letter A=0
  if(fallbackLetter){
    const letter = fallbackLetter.toUpperCase();
    return letter.charCodeAt(0) - 65;
  }
  return -1;
}
function rowVal(row, idx){
  if(idx < 0 || !row) return null;
  return row[idx] !== undefined ? row[idx] : null;
}

async function importExcelWorkbook(){
  if(!isElevated()){ toast('Only admin can import Excel.','err'); return; }
  const fileInput = $('xlsxFile');
  const status = $('xlsxStatus');
  const setStatus = (t)=>{ if(status) status.innerHTML = t; };
  const file = fileInput && fileInput.files && fileInput.files[0];
  if(!file){ toast('Choose an Excel .xlsx or .xlsm file first','err'); return; }
  const mode = ($('xlsxMode') && $('xlsxMode').value) || 'merge';

  try{
    setStatus('Loading Excel reader…');
    await loadSheetJS();
    setStatus('Reading <b>'+esc(file.name)+'</b> ('+Math.round(file.size/1024)+' KB)…');
    const buf = await file.arrayBuffer();
    // cellFormula:false — use cached calculated values when present
    const wb = XLSX.read(buf, {
      type: 'array',
      cellDates: true,
      cellNF: false,
      cellText: false,
      dense: false
    });
    const sheetList = (wb.SheetNames||[]).join(', ');
    setStatus('Sheets found ('+(wb.SheetNames||[]).length+'): '+esc(sheetList)+'<br>Importing…');

    const report = importWorkbookToDB(wb, mode);
    saveDB();
    populateLoginCashiers();
    setStatus(
      '<b style="color:#86efac">Import complete.</b><br>'+
      report.html +
      '<br><span class="muted">Open Stock Balance / Dashboard / Accounts to verify figures. Period set to '+
      esc(monthName(DB.selectedMonth)+' '+DB.selectedYear)+'.</span>'
    );
    toast('Excel import complete · '+report.summary);
    // stay on settings so user can read report
    render();
    // re-show status after render — store last report
    window.__lastImportReport = report;
    setTimeout(()=>{
      const el = $('xlsxStatus');
      if(el) el.innerHTML =
        '<b style="color:#86efac">Import complete.</b><br>'+report.html+
        '<br><span class="muted">Period: '+esc(monthName(DB.selectedMonth)+' '+DB.selectedYear)+
        ' · Products: '+DB.products.length+' · Stock rows: '+DB.stockRows.length+
        ' · Debtors: '+DB.debtors.length+' · Receipts: '+DB.receipts.length+'</span>';
    }, 50);
  }catch(e){
    console.error(e);
    setStatus('<b style="color:#fca5a5">Failed:</b> '+esc(e.message||String(e)));
    toast('Excel import failed: '+(e.message||e), 'err');
  }
}

function importWorkbookToDB(wb, mode){
  const lines = [];
  const securityBackup = deepClone(getSecurity());
  const bizBackup = deepClone(DB.business);

  if(mode === 'replace'){
    DB.products = [];
    DB.stockRows = [];
    DB.sales = [];
    DB.saleLines = [];
    DB.debtors = [];
    DB.creditors = [];
    DB.depositors = [];
    DB.debtorsMonthly = [];
    DB.creditorsMonthly = [];
    DB.depositorsMonthly = [];
    DB.accountTxns = [];
    DB.cashLog = [];
    DB.expenses = [];
    DB.kpiHistory = [];
    DB.receipts = [];
    DB.undoLog = [];
    DB.cashBalances = { 'Cash in Hand':0, 'Bank Savings':0, 'MOMO':0, 'Others':0 };
    lines.push('Mode: replace transactional data (security kept)');
  } else {
    lines.push('Mode: merge');
  }

  // ---------- BusinessInfo ----------
  const biz = getMatrix(wb, ['BusinessInfo','Business Info','businessinfo']);
  if(biz){
    const m = biz.matrix;
    const a1 = m[0] && m[0][0];
    const a2 = m[1] && m[1][0];
    const a3 = m[2] && m[2][0];
    if(cellStr(a1)) DB.business.name = cellStr(a1);
    if(cellStr(a2)) DB.business.address = cellStr(a2);
    if(cellStr(a3)) DB.business.tel = cellStr(a3);
    lines.push('✓ BusinessInfo ← '+biz.name);
  }

  // ---------- Cashiers ----------
  const cash = getMatrix(wb, ['Cashiers','cashiers','CASHIERS']);
  if(cash){
    let added = 0;
    const m = cash.matrix;
    const hr = findHeaderRow(m, ['name','cashier','tel','phone']);
    for(let r = hr+1; r < m.length; r++){
      const row = m[r]||[];
      const name = cellStr(row[0]);
      const tel = cellStr(row[1]);
      if(!name || name.toLowerCase()==='name') continue;
      const sec = getSecurity();
      let u = sec.cashiers.find(c => c.name.toLowerCase() === name.toLowerCase());
      if(u){ if(tel) u.tel = tel; }
      else {
        sec.cashiers.push({
          id: idStamp('USR-'), name, tel,
          role: /muniru/i.test(name) ? 'ADMIN' : 'CASHIER2',
          password: 'change-me', sig: 'Sig_User.jpg', active: true
        });
        added++;
      }
    }
    lines.push('✓ Cashiers ← '+cash.name+(added?(' · +'+added+' new (set passwords in Settings)'):''));
  }

  // ---------- STOCK AND SALES RECORDS (critical) ----------
  // VBA columns: B=PRODUCT NAME, C=CATEGORY, D=QTY IN, E=R STOCK, G=U COST,
  // J=YEAR, K=MONTH, L=QTY OUT, M=U PRICE, N=DISC, O=T SALES, P=PROFIT, Q=A PRICE
  const stockPack = getMatrix(wb, [
    'STOCK AND SALES RECORDS','Stock and Sales Records','STOCK AND SALES',
    'Stock And Sales Records','MasterTable','STOCK'
  ]);
  let stockCount = 0, stockSkipped = 0;
  if(stockPack){
    const m = stockPack.matrix;
    const hr = findHeaderRow(m, ['product','qty','year','month','cost','price','name']);
    const hmap = mapHeaders(m[hr]||[]);
    // Prefer header map; fall back to fixed VBA letters (0-based: A=0 … B=1)
    const cName = colIndex(hmap, ['product name','product','item','name'], 'B');
    const cCat  = colIndex(hmap, ['category','cat'], 'C');
    const cIn   = colIndex(hmap, ['qty in','qtyin','quantity in','in'], 'D');
    const cRem  = colIndex(hmap, ['r stock','rstock','cr stock','remaining','rem stock','stock'], 'E');
    const cCost = colIndex(hmap, ['u cost','unit cost','ucost','cost'], 'G');
    const cYear = colIndex(hmap, ['year','yr'], 'J');
    const cMon  = colIndex(hmap, ['month','mon'], 'K');
    const cOut  = colIndex(hmap, ['qty out','qtyout','quantity out','out','sold'], 'L');
    const cPrice= colIndex(hmap, ['u price','unit price','uprice','price','selling'], 'M');
    const cDisc = colIndex(hmap, ['disc','discount'], 'N');
    const cSales= colIndex(hmap, ['t sales','tsales','total sales','sales amount','sales'], 'O');
    const cProf = colIndex(hmap, ['profit'], 'P');
    const cAdj  = colIndex(hmap, ['a price','aprice','price adj','adjustment'], 'Q');

    lines.push('· Stock headers row '+(hr+1)+' · cols name='+cName+' in='+cIn+' cost='+cCost+' year='+cYear+' month='+cMon);

    const productSet = new Map(DB.products.map(p => [p.name.toLowerCase(), p]));

    for(let r = hr+1; r < m.length; r++){
      const row = m[r] || [];
      const productName = cellStr(rowVal(row, cName));
      if(!productName) { stockSkipped++; continue; }
      // skip totals / junk
      if(/^(total|grand|sum|#n\/a)/i.test(productName)) { stockSkipped++; continue; }

      let year = yearFromValue(rowVal(row, cYear));
      let month = monthFromValue(rowVal(row, cMon));
      if(!year || !month){
        // try any date-looking cell
        stockSkipped++;
        // still allow if we can salvage
        if(!year) year = DB.selectedYear || new Date().getFullYear();
        if(!month) month = DB.selectedMonth || (new Date().getMonth()+1);
      }

      const qtyIn = cellNum(rowVal(row, cIn));
      const qtyOut = cellNum(rowVal(row, cOut));
      let rStock = cellNum(rowVal(row, cRem));
      const uCost = cellNum(rowVal(row, cCost));
      const uPrice = cellNum(rowVal(row, cPrice));
      const disc = cellNum(rowVal(row, cDisc));
      let tSales = cellNum(rowVal(row, cSales));
      let profit = cellNum(rowVal(row, cProf));
      const aPrice = cellNum(rowVal(row, cAdj));
      const category = cellStr(rowVal(row, cCat));

      // Recompute if Excel formulas not cached in file
      if(rStock === 0 && (qtyIn !== 0 || qtyOut !== 0)){
        rStock = qtyIn - qtyOut;
      }
      if(tSales === 0 && qtyOut !== 0 && uPrice !== 0){
        tSales = (qtyOut * uPrice) - disc;
      }
      if(profit === 0 && tSales !== 0){
        profit = tSales - (qtyOut * uCost);
      }

      // Skip completely empty numeric rows
      if(qtyIn===0 && qtyOut===0 && rStock===0 && uCost===0 && tSales===0 && !category){
        // still keep if product name only? skip noise
        if(!uPrice){ stockSkipped++; continue; }
      }

      if(!productSet.has(productName.toLowerCase())){
        const p = { id: 'PRD-IMP-'+Date.now()+'-'+r, name: productName, category, uPrice: uPrice||0 };
        DB.products.push(p);
        productSet.set(productName.toLowerCase(), p);
      } else {
        const p = productSet.get(productName.toLowerCase());
        if(category && !p.category) p.category = category;
        if(uPrice) p.uPrice = uPrice;
      }

      const rec = {
        id: 'STKIN-IMP-'+year+'-'+month+'-'+r,
        productId: productSet.get(productName.toLowerCase()).id,
        productName, category, year, month,
        qtyIn, rStock, uCost, qtyOut,
        uPrice: uPrice||0,
        disc, tSales, profit, aPrice,
        imported: true
      };

      if(mode === 'merge'){
        const existing = DB.stockRows.find(x =>
          x.productName === productName && x.year===year && x.month===month &&
          Math.abs((Number(x.uCost)||0) - uCost) < 0.0001
        );
        if(existing){
          // Prefer non-zero imported history figures
          existing.qtyIn = qtyIn || existing.qtyIn;
          existing.qtyOut = qtyOut || existing.qtyOut;
          existing.rStock = rStock;
          existing.tSales = tSales || existing.tSales;
          existing.profit = profit || existing.profit;
          existing.disc = disc || existing.disc;
          existing.aPrice = aPrice || existing.aPrice;
          if(uPrice) existing.uPrice = uPrice;
          if(uCost) existing.uCost = uCost;
        } else {
          DB.stockRows.push(rec);
        }
      } else {
        DB.stockRows.push(rec);
      }
      stockCount++;
    }
    lines.push('✓ Stock ← '+stockPack.name+' · <b>'+stockCount+'</b> rows imported'+(stockSkipped?(' · skipped '+stockSkipped):''));
  } else {
    lines.push('✗ STOCK AND SALES RECORDS sheet <b>not found</b>. Sheets: '+esc((wb.SheetNames||[]).join(', ')));
  }

  // ---------- Account registers (fixed VBA layout A–F) ----------
  function importAccountsFixed(candidates, kind, prefix){
    const pack = getMatrix(wb, candidates);
    if(!pack){ lines.push('· '+kind+': sheet not found'); return 0; }
    const m = pack.matrix;
    const hr = findHeaderRow(m, ['name','balance','id','contact','phone']);
    const hmap = mapHeaders(m[hr]||[]);
    // VBA: A=ID B=Name C=Contact D=Description E=Balance F=Date
    let cId = colIndex(hmap, ['id','account id','debtor id'], 'A');
    let cName = colIndex(hmap, ['name','account name','debtor','creditor'], 'B');
    let cContact = colIndex(hmap, ['contact','phone','tel','mobile'], 'C');
    let cDesc = colIndex(hmap, ['description','desc','details'], 'D');
    let cBal = colIndex(hmap, ['balance','bal','amount','outstanding'], 'E');
    let cDate = colIndex(hmap, ['date','updated'], 'F');

    // If header row looks wrong (name col empty for data), force VBA letters
    let sampleName = '';
    for(let r=hr+1; r<Math.min(m.length, hr+6); r++){
      sampleName = cellStr(rowVal(m[r], cName));
      if(sampleName) break;
    }
    if(!sampleName){
      cId=0; cName=1; cContact=2; cDesc=3; cBal=4; cDate=5;
    }

    let n=0, sumBal=0;
    for(let r=hr+1; r<m.length; r++){
      const row = m[r]||[];
      let id = cellStr(rowVal(row, cId));
      const name = cellStr(rowVal(row, cName));
      if(!name && !id) continue;
      if(/^(name|id|total)/i.test(name)) continue;
      const contact = cellStr(rowVal(row, cContact));
      const description = cellStr(rowVal(row, cDesc));
      const balance = cellNum(rowVal(row, cBal));
      const date = excelDateToISO(rowVal(row, cDate));
      if(!id) id = idStamp(prefix)+'-'+r;

      const list = DB[kind];
      let existing = list.find(x => x.id === id || (name && (x.name||'').toLowerCase()===name.toLowerCase()));
      if(existing){
        // Always take Excel balance on import (user wants true figures)
        existing.balance = balance;
        if(contact) existing.contact = contact;
        if(description) existing.description = description;
        existing.date = date;
      } else {
        list.push({ id, name: name||id, contact, description, balance, date });
      }
      sumBal += balance;
      n++;
    }
    lines.push('✓ '+kind+' ← '+pack.name+' · '+n+' records · Σ balance <b>'+fmtN(sumBal)+'</b>');
    return n;
  }
  importAccountsFixed(['DEBTORS','Debtors','debtors'], 'debtors', 'DEB-');
  importAccountsFixed(['CREDITORS','Creditors','creditors'], 'creditors', 'CRD-');
  importAccountsFixed(['DEPOSITORS','Depositors','depositors'], 'depositors', 'DEP-');

  // ---------- Monthly snapshots ----------
  function importMonthlyFixed(candidates, targetKey){
    const pack = getMatrix(wb, candidates);
    if(!pack) return 0;
    const m = pack.matrix;
    const hr = findHeaderRow(m, ['name','year','month','balance','id']);
    let n=0;
    for(let r=hr+1; r<m.length; r++){
      const row = m[r]||[];
      // A ID B Name C Phone D Year E Month F bal G Closing
      const id = cellStr(row[0]);
      const name = cellStr(row[1]);
      if(!id && !name) continue;
      const phone = cellStr(row[2]);
      const snapYear = yearFromValue(row[3]) || Math.floor(cellNum(row[3]));
      const snapMonth = monthFromValue(row[4]) || Math.floor(cellNum(row[4]));
      const bal = cellNum(row[5]);
      const closingBalance = cellNum(row[6]) || bal;
      if(!snapYear) continue;
      if(mode==='merge' && DB[targetKey].some(x=>x.id===id && x.snapYear===snapYear && x.snapMonth===snapMonth)) continue;
      DB[targetKey].push({ id, name, phone, snapYear, snapMonth, bal, closingBalance });
      n++;
    }
    if(n) lines.push('✓ '+targetKey+' · '+n);
    return n;
  }
  importMonthlyFixed(['DEBTORS_MONTHLY','Debtors_Monthly','DEBTORS MONTHLY'], 'debtorsMonthly');
  importMonthlyFixed(['CREDITORS_MONTHLY','Creditors_Monthly','CREDITORS MONTHLY'], 'creditorsMonthly');
  importMonthlyFixed(['DEPOSITORS_MONTHLY','Depositors_Monthly','DEPOSITORS MONTHLY'], 'depositorsMonthly');

  // ---------- ACCOUNT_TRANSACTIONS ----------
  const atx = getMatrix(wb, ['ACCOUNT_TRANSACTIONS','Account_Transactions','Account Transactions','ACCOUNT TRANSACTIONS']);
  if(atx){
    const m = atx.matrix;
    const hr = findHeaderRow(m, ['account','amount','type','name','txn']);
    let n=0;
    for(let r=hr+1; r<m.length; r++){
      const row = m[r]||[];
      // A ATX B accountID C type D name E txn F amount G balAfter H date J receipt
      const id = cellStr(row[0]) || (idStamp('ATX-')+'-'+r);
      const accountID = cellStr(row[1]);
      const accountType = cellStr(row[2]);
      const name = cellStr(row[3]);
      const txnType = cellStr(row[4]);
      const amount = cellNum(row[5]);
      const balanceAfter = cellNum(row[6]);
      const date = excelDateToISO(row[7]);
      const receiptNo = cellStr(row[9] !== undefined ? row[9] : row[8]);
      if(!accountID && !name) continue;
      if(mode==='merge' && DB.accountTxns.some(t=>t.id===id)) continue;
      DB.accountTxns.push({ id, accountID, accountType, name, txnType, amount, balanceAfter, date, receiptNo, cashier:'import' });
      n++;
    }
    lines.push('✓ Account txns · '+n);
  }

  // ---------- CASH_BALANCES ----------
  const cb = getMatrix(wb, ['CASH_BALANCES','Cash_Balances','Cash Balances','CASH BALANCES']);
  if(cb){
    let hits=0;
    cb.matrix.forEach((row,i)=>{
      if(!row) return;
      const t = cellStr(row[0]);
      const bal = cellNum(row[1]);
      const key = CASH_TYPES.find(x => x.toLowerCase() === t.toLowerCase());
      if(key){ DB.cashBalances[key] = bal; hits++; }
      // rows B2:B5 without labels in col A — map by row index if needed
    });
    // Fallback: if sheet is only balances in B2:B5
    if(!hits && cb.matrix.length >= 5){
      // try row1-4 values in col B
      for(let i=0;i<4;i++){
        const bal = cellNum((cb.matrix[i+1]||[])[1] !== undefined ? (cb.matrix[i+1]||[])[1] : (cb.matrix[i+1]||[])[0]);
        if(CASH_TYPES[i]) { DB.cashBalances[CASH_TYPES[i]] = bal; hits++; }
      }
    }
    lines.push('✓ Cash balances · '+hits+' wallets · total '+fmtN(KPI_CashBuckets_Total()));
  }

  // ---------- CASH_BALANCE_LOG ----------
  const cbl = getMatrix(wb, ['CASH_BALANCE_LOG','Cash_Balance_Log','Cash Balance Log']);
  if(cbl){
    const m = cbl.matrix;
    const hr = findHeaderRow(m, ['cash','amount','type','action']);
    let n=0;
    for(let r=hr+1;r<m.length;r++){
      const row = m[r]||[];
      const id = cellStr(row[0]) || (idStamp('CB-')+'-'+r);
      if(mode==='merge' && DB.cashLog.some(x=>x.id===id)) continue;
      const cashType = cellStr(row[1]);
      if(!cashType) continue;
      DB.cashLog.push({
        id, cashType,
        action: cellStr(row[2])||'Add',
        amount: cellNum(row[3]),
        before: cellNum(row[4]),
        after: cellNum(row[5]),
        at: excelDateToISO(row[6]),
        cashier: cellStr(row[7])||'import',
        note: 'excel-import'
      });
      n++;
    }
    lines.push('✓ Cash log · '+n);
  }

  // ---------- EXPENSES ----------
  const exp = getMatrix(wb, ['EXPENSES','Expenses']);
  if(exp){
    const m = exp.matrix;
    const hr = findHeaderRow(m, ['description','amount','category','date']);
    let n=0, sum=0;
    for(let r=hr+1;r<m.length;r++){
      const row = m[r]||[];
      const id = cellStr(row[0]) || (idStamp('EXP-')+'-'+r);
      const description = cellStr(row[1]);
      if(!description || /^description$/i.test(description)) continue;
      if(mode==='merge' && DB.expenses.some(x=>x.id===id)) continue;
      const amount = cellNum(row[3] !== undefined && cellNum(row[3]) ? row[3] : row[2]);
      // VBA: A id B desc C cat D amount E date — try both if needed
      let category = cellStr(row[2]);
      let amt = cellNum(row[3]);
      let dateV = row[4];
      if(amt === 0 && cellNum(row[2]) !== 0 && !category){
        // shifted?
        amt = cellNum(row[2]); category = 'Miscellaneous'; dateV = row[3];
      }
      if(amt === 0) amt = cellNum(row[3]) || cellNum(row[2]);
      DB.expenses.push({
        id, description,
        category: category || 'Miscellaneous',
        amount: amt,
        date: excelDateToISO(dateV),
        cashier: 'import'
      });
      sum += amt; n++;
    }
    lines.push('✓ Expenses · '+n+' · Σ '+fmtN(sum));
  }

  // ---------- RECEIPT REGISTER ----------
  const reg = getMatrix(wb, ['RECEIPT REGISTER','Receipt Register','RECEIPTS','Receipts']);
  if(reg){
    const m = reg.matrix;
    const hr = findHeaderRow(m, ['receipt','customer','total','date']);
    const hmap = mapHeaders(m[hr]||[]);
    const cR = colIndex(hmap, ['receipt no','receipt','receiptno','sr'], 'A');
    const cC = colIndex(hmap, ['customer','customer name','name'], 'B');
    const cT = colIndex(hmap, ['contact','tel','phone'], 'C');
    const cTot = colIndex(hmap, ['total','total amount','amount'], 'D');
    const cBal = colIndex(hmap, ['balance','owed'], 'E');
    const cDate = colIndex(hmap, ['date'], 'F');
    const cCash = colIndex(hmap, ['cashier'], 'G');
    let n=0, sum=0;
    for(let r=hr+1;r<m.length;r++){
      const row = m[r]||[];
      const receiptNo = cellStr(rowVal(row, cR >=0 ? cR : 0));
      if(!receiptNo || /^receipt/i.test(receiptNo)) continue;
      if(mode==='merge' && DB.receipts.some(x=>x.receiptNo===receiptNo)) continue;
      const totalAmount = cellNum(rowVal(row, cTot >=0 ? cTot : 3));
      const balance = cellNum(rowVal(row, cBal >=0 ? cBal : 4));
      DB.receipts.push({
        receiptNo,
        customerName: cellStr(rowVal(row, cC >=0 ? cC : 1)),
        contact: cellStr(rowVal(row, cT >=0 ? cT : 2)),
        totalAmount,
        amountPaid: Math.max(0, totalAmount - balance),
        balance: balance > 0 ? balance : 0,
        date: excelDateToISO(rowVal(row, cDate >=0 ? cDate : 5)),
        credit: balance > 0,
        cashier: cellStr(rowVal(row, cCash >=0 ? cCash : 6)) || 'import',
        lines: []
      });
      sum += totalAmount; n++;
    }
    lines.push('✓ Receipts · '+n+' · Σ '+fmtN(sum));
  }

  // ---------- KPI_HISTORY ----------
  const kpi = getMatrix(wb, ['KPI_HISTORY','KPI History','Kpi_History']);
  if(kpi){
    const m = kpi.matrix;
    const hr = findHeaderRow(m, ['year','month','gross','net']);
    let n=0;
    for(let r=hr+1;r<m.length;r++){
      const row = m[r]||[];
      const year = yearFromValue(row[0]) || Math.floor(cellNum(row[0]));
      const month = monthFromValue(row[1]) || Math.floor(cellNum(row[1]));
      if(!year || !month) continue;
      if(mode==='merge' && DB.kpiHistory.some(k=>k.year===year && k.month===month)) continue;
      DB.kpiHistory.push({
        year, month,
        qtyIn: cellNum(row[2]), qtyOut: cellNum(row[3]), qtyRem: cellNum(row[4]),
        gross: cellNum(row[5]), net: cellNum(row[6]),
        liquidCash: cellNum(row[7]), debt: cellNum(row[8]),
        creditors: cellNum(row[9]), deposits: cellNum(row[10])
      });
      n++;
    }
    lines.push('✓ KPI history · '+n);
  }

  // ---------- UndoLog ----------
  const ul = getMatrix(wb, ['UndoLog','UNDOLOG','Undo Log']);
  if(ul){
    const m = ul.matrix;
    const hr = findHeaderRow(m, ['row','product','type','qty']);
    let n=0;
    for(let r=hr+1;r<m.length;r++){
      const row = m[r]||[];
      const product = cellStr(row[1]);
      const type = cellStr(row[2]);
      if(!product && !type) continue;
      DB.undoLog.push({
        row: row[0], product, type,
        qty: cellNum(row[3]), disc: cellNum(row[4]),
        at: excelDateToISO(row[5]),
        batchId: cellStr(row[17] !== undefined ? row[17] : ''),
        cashier: 'import'
      });
      n++;
    }
    lines.push('✓ UndoLog · '+n);
  }

  // Always restore security (never take passwords from excel)
  DB.security = securityBackup;
  if(!DB.business.name) DB.business = bizBackup;

  // Products from stock if needed
  if(!DB.products.length && DB.stockRows.length){
    const seen = new Set();
    DB.stockRows.forEach(r=>{
      const k = (r.productName||'').toLowerCase();
      if(!k || seen.has(k)) return;
      seen.add(k);
      DB.products.push({ id: r.productId||idStamp('PRD-'), name: r.productName, category: r.category||'', uPrice: r.uPrice||0 });
    });
  }

  // Period = latest month that has stock activity
  let best = { year:0, month:0 };
  DB.stockRows.forEach(r=>{
    if(r.year > best.year || (r.year===best.year && r.month>best.month)) best = { year:r.year, month:r.month };
  });
  if(best.year){ DB.selectedYear = best.year; DB.selectedMonth = best.month; }

  // Summary stats
  const stockVal = DB.stockRows.reduce((s,r)=>s+(Number(r.rStock)||0)*(Number(r.uCost)||0),0);
  const salesVal = DB.stockRows.reduce((s,r)=>s+(Number(r.tSales)||0),0);
  const debtVal = DB.debtors.reduce((s,d)=>s+(Number(d.balance)||0),0);
  lines.push('——');
  lines.push('Totals now in app: Products <b>'+DB.products.length+'</b> · Stock rows <b>'+DB.stockRows.length+
    '</b> · CR stock value <b>'+fmt(stockVal)+'</b> · Σ T Sales (all rows) <b>'+fmt(salesVal)+
    '</b> · Debtors Σ <b>'+fmt(debtVal)+'</b>');

  if(stockCount === 0 && stockPack){
    lines.push('<b style="color:#fcd34d">Warning:</b> Stock sheet found but 0 data rows parsed. Headers may differ — send sheet screenshot or first-row headers.');
  }
  if(!stockPack){
    lines.push('<b style="color:#fcd34d">Warning:</b> Main stock sheet missing. Rename tab to STOCK AND SALES RECORDS or re-export from Excel.');
  }

  const summary = 'stock '+DB.stockRows.length+' · debtors '+DB.debtors.length+' · receipts '+DB.receipts.length;
  return {
    summary,
    html: lines.map(l=>'• '+l).join('<br>')
  };
}

/* ---------- escape ---------- */
function esc(s){ return String(s??'').replace(/[&<>"']/g,c=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c])); }
function escAttr(s){ return esc(s).replace(/\n/g,''); }

/* ---------- clock + SW ---------- */
function tick(){
  const d = new Date();
  const el = $('clockPill');
  if(el) el.textContent = d.toLocaleString('en-GH',{hour12:false});
}
function registerSW(){
  if(!('serviceWorker' in navigator)) return;
  // only on http(s)
  if(location.protocol==='file:') return;
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}

/* ---------- boot ---------- */
loadDB();
populateLoginCashiers();
tick(); setInterval(tick, 1000);
registerSW();
// Enter key on login
document.addEventListener('keydown', (e)=>{
  if(e.key==='Enter' && $('loginScreen').style.display!=='none'){
    doLogin();
  }
});
