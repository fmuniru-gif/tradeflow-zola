<!DOCTYPE html>
<html lang="en-GH">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0f766e" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="description" content="Zola Electronics Zone — Sales & Inventory PWA (offline)" />
<title>Zola Electronics Zone · TradeFlow v3.2</title>
<link rel="manifest" href="manifest.json" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%230f766e'/%3E%3Ctext x='32' y='44' font-size='32' text-anchor='middle' fill='white' font-family='Arial Black'%3EZ%3C/text%3E%3C/svg%3E" />
<style>
:root{
  --bg:#0f172a; --panel:#1e293b; --panel2:#334155; --line:#475569;
  --text:#f1f5f9; --muted:#94a3b8; --teal:#0f766e; --teal2:#14b8a6;
  --green:#22c55e; --red:#ef4444; --amber:#f59e0b; --blue:#3b82f6; --pink:#ec4899;
  --radius:14px; --shadow:0 8px 24px rgba(0,0,0,.35);
  --safe-b:env(safe-area-inset-bottom,0px);
  --font:system-ui,-apple-system,"Segoe UI",Roboto,Ubuntu,"Helvetica Neue",Arial,sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;height:100%;background:var(--bg);color:var(--text);font-family:var(--font);-webkit-tap-highlight-color:transparent}
button,input,select,textarea{font:inherit;color:inherit}
button{cursor:pointer;border:0;background:none}
a{color:var(--teal2)}
.app{display:flex;min-height:100%;}
.sidebar{width:260px;background:linear-gradient(180deg,#0b1224,#0f172a);border-right:1px solid #1e293b;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;z-index:20;transition:transform .25s}
.brand{padding:18px 16px 10px;border-bottom:1px solid #1e293b}
.brand h1{margin:0;font-size:15px;letter-spacing:.3px;color:#fff}
.brand p{margin:4px 0 0;font-size:11px;color:var(--muted)}
.nav{padding:10px 8px;overflow:auto;flex:1}
.nav button{width:100%;text-align:left;padding:11px 12px;border-radius:10px;color:var(--muted);display:flex;gap:10px;align-items:center;margin-bottom:2px;font-size:13.5px}
.nav button:hover{background:#1e293b;color:#fff}
.nav button.active{background:rgba(15,118,110,.25);color:var(--teal2);font-weight:600}
.nav .sec{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:#64748b;padding:14px 12px 6px}
.userbox{padding:12px;border-top:1px solid #1e293b;font-size:12px;color:var(--muted)}
.userbox strong{color:#fff;display:block}
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid #1e293b;background:rgba(15,23,42,.9);position:sticky;top:0;z-index:15;backdrop-filter:blur(8px)}
.topbar h2{margin:0;font-size:17px;flex:1}
.burger{display:none;width:40px;height:40px;border-radius:10px;background:var(--panel);font-size:18px}
.content{padding:16px;padding-bottom:calc(24px + var(--safe-b));flex:1}
.grid{display:grid;gap:12px}
.g2{grid-template-columns:repeat(2,1fr)}
.g3{grid-template-columns:repeat(3,1fr)}
.g4{grid-template-columns:repeat(4,1fr)}
.g6{grid-template-columns:repeat(6,1fr)}
@media(max-width:1100px){.g6{grid-template-columns:repeat(3,1fr)}.g4{grid-template-columns:repeat(2,1fr)}}
@media(max-width:720px){
  .sidebar{position:fixed;transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0);box-shadow:var(--shadow)}
  .burger{display:inline-flex;align-items:center;justify-content:center}
  .g2,.g3,.g4,.g6{grid-template-columns:1fr 1fr}
  .g1m{grid-template-columns:1fr}
}
.card{background:var(--panel);border:1px solid #273449;border-radius:var(--radius);padding:14px;box-shadow:0 2px 0 rgba(0,0,0,.15)}
.card h3{margin:0 0 8px;font-size:13px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.kpi{min-height:92px}
.kpi .val{font-size:22px;font-weight:700;letter-spacing:-.3px}
.kpi .sub{font-size:11px;color:var(--muted);margin-top:4px}
.kpi.teal .val{color:var(--teal2)}
.kpi.green .val{color:var(--green)}
.kpi.red .val{color:var(--red)}
.kpi.amber .val{color:var(--amber)}
.kpi.blue .val{color:var(--blue)}
.kpi.pink .val{color:var(--pink)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 14px;border-radius:10px;background:var(--teal);color:#fff;font-weight:600;font-size:13.5px;border:1px solid transparent;transition:.15s}
.btn:hover{filter:brightness(1.08)}
.btn:active{transform:scale(.98)}
.btn.ghost{background:transparent;border-color:var(--line);color:var(--text)}
.btn.danger{background:#b91c1c}
.btn.warn{background:#b45309}
.btn.ok{background:#15803d}
.btn.sm{padding:7px 10px;font-size:12px;border-radius:8px}
.btn:disabled{opacity:.45;cursor:not-allowed}
.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.field{display:flex;flex-direction:column;gap:4px;margin-bottom:10px;min-width:0}
.field label{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.3px}
.field input,.field select,.field textarea{
  background:#0b1220;border:1px solid #334155;border-radius:10px;padding:10px 12px;outline:none;width:100%;
}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--teal2);box-shadow:0 0 0 3px rgba(20,184,166,.15)}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{padding:9px 8px;border-bottom:1px solid #273449;text-align:left}
th{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.4px;position:sticky;top:0;background:var(--panel)}
tr:hover td{background:rgba(255,255,255,.02)}
.credit-row td{background:rgba(255,199,206,.12)!important;color:#fca5a5}
.badge{display:inline-block;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:700}
.badge.admin{background:rgba(245,158,11,.2);color:var(--amber)}
.badge.cashier{background:rgba(59,130,246,.2);color:#93c5fd}
.badge.ok{background:rgba(34,197,94,.15);color:var(--green)}
.badge.warn{background:rgba(245,158,11,.15);color:var(--amber)}
.badge.bad{background:rgba(239,68,68,.15);color:#fca5a5}
.modal-bg{position:fixed;inset:0;background:rgba(2,6,23,.72);display:none;align-items:center;justify-content:center;z-index:100;padding:16px}
.modal-bg.show{display:flex}
.modal{background:var(--panel);border:1px solid #334155;border-radius:16px;width:min(520px,100%);max-height:90vh;overflow:auto;padding:18px;box-shadow:var(--shadow)}
.modal h3{margin:0 0 12px;font-size:18px}
.toast-wrap{position:fixed;right:14px;bottom:calc(14px + var(--safe-b));z-index:200;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:#0b1220;border:1px solid #334155;color:#fff;padding:10px 14px;border-radius:10px;font-size:13px;box-shadow:var(--shadow);animation:slide .25s ease}
.toast.ok{border-color:#166534}.toast.err{border-color:#991b1b}.toast.warn{border-color:#92400e}
@keyframes slide{from{transform:translateY(12px);opacity:0}to{transform:none;opacity:1}}
.login-screen{position:fixed;inset:0;background:radial-gradient(1200px 600px at 20% -10%,#134e4a,transparent),var(--bg);display:flex;align-items:center;justify-content:center;z-index:300;padding:16px}
.login-card{width:min(400px,100%);background:var(--panel);border:1px solid #334155;border-radius:18px;padding:28px 22px;box-shadow:var(--shadow)}
.login-card h1{margin:0 0 4px;font-size:20px;text-align:center}
.login-card .sub{text-align:center;color:var(--muted);font-size:12px;margin-bottom:18px}
.hidden{display:none!important}
.muted{color:var(--muted)}
.right{text-align:right}
.mono{font-variant-numeric:tabular-nums;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
.hr{border:0;border-top:1px solid #273449;margin:14px 0}
.cart-item{display:flex;justify-content:space-between;gap:8px;padding:8px 0;border-bottom:1px solid #273449;font-size:13px}
.pill{display:inline-flex;align-items:center;gap:6px;background:#0b1220;border:1px solid #334155;border-radius:999px;padding:4px 10px;font-size:12px}
.search{position:relative}
.search input{padding-left:36px}
.search::before{content:"⌕";position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:14px}
.table-wrap{overflow:auto;max-height:55vh;border:1px solid #273449;border-radius:12px}
.footer-note{font-size:11px;color:#64748b;margin-top:18px;text-align:center}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:19;display:none}
.overlay.show{display:block}
.receipt-paper{background:#fff;color:#111;padding:18px;border-radius:8px;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12px;line-height:1.45}
.receipt-paper h4{margin:0 0 6px;text-align:center;font-size:14px}
.receipt-paper .center{text-align:center}
.tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.tabs button{padding:8px 12px;border-radius:999px;background:#0b1220;border:1px solid #334155;color:var(--muted);font-size:12.5px;font-weight:600}
.tabs button.active{background:rgba(15,118,110,.3);border-color:var(--teal);color:var(--teal2)}
.empty{padding:28px;text-align:center;color:var(--muted);font-size:13px}
.statline{display:flex;justify-content:space-between;font-size:13px;padding:6px 0;border-bottom:1px dashed #273449}
.statline b{font-variant-numeric:tabular-nums}

.sale-layout{display:grid;grid-template-columns:1.4fr 1fr;gap:12px}
@media(max-width:900px){.sale-layout{grid-template-columns:1fr}}
.sale-theme{background:rgba(230,240,255,.04);border-color:#1e3a5f}
.field input:disabled,.field input[readonly]{opacity:.75;cursor:not-allowed}
.suggest{position:absolute;left:0;right:0;top:100%;z-index:30;background:#0b1220;border:1px solid #334155;border-radius:10px;max-height:160px;overflow:auto;display:none}
.suggest.show{display:block}
.suggest div{padding:8px 12px;cursor:pointer;font-size:13px}
.suggest div:hover,.suggest div.active{background:rgba(15,118,110,.25)}
.suggest .none{color:#fca5a5;cursor:default}
.pos-totals .statline b{font-size:15px}
.credit-row td{background:rgba(255,199,206,.18)!important;color:#fca5a5}

</style>
</head>
<body>
<!-- LOGIN -->
<div id="loginScreen" class="login-screen">
  <div class="login-card">
    <div style="text-align:center;margin-bottom:10px">
      <div style="width:64px;height:64px;border-radius:16px;background:var(--teal);display:inline-flex;align-items:center;justify-content:center;font-size:28px;font-weight:800;color:#fff">Z</div>
    </div>
    <h1>Zola Electronics Zone</h1>
    <div class="sub">TradeFlow v3.2.1 · Tamale · GH₵ · Offline-ready</div>
    <div class="field">
      <label>Cashier</label>
      <select id="loginCashier"><!-- filled by populateLoginCashiers() --></select>
    </div>
    <div class="field">
      <label>Password</label>
      <input id="loginPass" type="password" placeholder="Enter password" autocomplete="current-password" />
    </div>
    <button class="btn" style="width:100%;margin-top:6px" onclick="doLogin()">Sign in</button>
    <p class="muted" style="font-size:11px;text-align:center;margin:14px 0 0">Data stays on this device until you Export / Import.</p>
  </div>
</div>

<div class="overlay" id="sideOverlay" onclick="closeSide()"></div>

<div class="app" id="appShell" style="display:none">
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <h1>Zola Electronics Zone</h1>
      <p>TradeFlow PWA · v3.2.1 · Tamale · GH₵</p>
    </div>
    <nav class="nav" id="mainNav">
      <div class="sec" data-admin-only>Main</div>
      <button data-view="dashboard" data-admin-only onclick="nav('dashboard')">📊 Dashboard KPIs</button>
      <button data-view="pos" class="active" onclick="nav('pos')">🛒 Sale Out</button>
      <button data-view="receipts" onclick="nav('receipts')">🖨️ Receipts</button>
      <button data-view="stockin" data-admin-only id="navStockIn" onclick="nav('stockin')">📥 Stock In</button>
      <button data-view="products" data-admin-only onclick="nav('products')">📦 Products</button>
      <button data-view="stock" data-admin-only onclick="nav('stock')">📋 Stock Balance</button>
      <div class="sec" data-admin-only>Money</div>
      <button data-view="cash" data-admin-only onclick="nav('cash')">💵 Cash Balances</button>
      <button data-view="expenses" data-admin-only onclick="nav('expenses')">🧾 Expenses</button>
      <button data-view="accounts" data-admin-only onclick="nav('accounts')">👥 Accounts</button>
      <div class="sec" data-admin-only>Period</div>
      <button data-view="monthend" data-admin-only id="navMonthEnd" onclick="nav('monthend')">📅 Start New Month</button>
      <button data-view="reports" data-admin-only onclick="nav('reports')">📈 Reports</button>
      <div class="sec">System</div>
      <button data-view="sync" data-admin-only onclick="nav('sync')">🔄 Sync / Backup</button>
      <button data-view="settings" data-admin-only onclick="nav('settings')">⚙️ Settings</button>
      <button id="navAdminMode" onclick="toggleAdminModeBtn()">🔐 Admin Mode (OFF)</button>
      <button onclick="doLogout()">🚪 Logout</button>
    </nav>
    <div class="userbox">
      <strong id="uiUserName">—</strong>
      <span id="uiUserRole" class="badge admin">ADMIN</span>
      <div class="muted" style="margin-top:6px" id="uiPeriod">—</div>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <button class="burger" onclick="toggleSide()" aria-label="Menu">☰</button>
      <h2 id="viewTitle">Dashboard KPIs</h2>
      <span class="pill mono" id="clockPill">—</span>
      <button class="btn sm ghost" onclick="refreshAll()" title="Refresh">↻</button>
    </div>
    <div class="content" id="viewRoot"></div>
  </div>
</div>

<div class="toast-wrap" id="toasts"></div>
<div class="modal-bg" id="modalBg" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modalBody"></div>
</div>

<script>
/* =========================================================
   TradeFlow PWA v3.0 — Zola Electronics Zone (Tamale)
   Full offline sales / inventory / cash / accounts / KPIs
   ========================================================= */
const APP_VERSION = '3.2.1';
const DB_KEY = 'tradeflow_v321_zola';
const VAT_RATE = 0;
const BUSINESS = {
  name: 'Zola Electronics Zone',
  address: 'Tamale, Northern Region, Ghana',
  tel: '0553486788'
};
/* Default security seed — live values live in DB.security (editable by admin) */
const DEFAULT_SECURITY = {
  adminPIN: '055348',
  pricePIN: '0000',
  cashiers: [
    { id: 'USR-ADMIN', name: 'Muniru Fuseini', tel: '0553486788', role: 'ADMIN', password: 'trnat330', sig: 'Sig_Mun.jpg', active: true },
    { id: 'USR-C2', name: 'Abdul-Basit', tel: '0508223452', role: 'CASHIER2', password: '6522558', sig: 'Sig_Bas.jpg', active: true }
  ]
};
function getSecurity(){
  if(!DB) return deepClone(DEFAULT_SECURITY);
  if(!DB.security) DB.security = deepClone(DEFAULT_SECURITY);
  if(!Array.isArray(DB.security.cashiers) || !DB.security.cashiers.length){
    DB.security.cashiers = deepClone(DEFAULT_SECURITY.cashiers);
  }
  if(!DB.security.adminPIN) DB.security.adminPIN = DEFAULT_SECURITY.adminPIN;
  if(!DB.security.pricePIN) DB.security.pricePIN = DEFAULT_SECURITY.pricePIN;
  return DB.security;
}
function getCashiers(){ return getSecurity().cashiers.filter(c => c.active !== false); }
function getAdminPIN(){ return getSecurity().adminPIN || DEFAULT_SECURITY.adminPIN; }
function getPricePIN(){ return getSecurity().pricePIN || DEFAULT_SECURITY.pricePIN; }
function getCashierByName(name){ return getCashiers().find(c => c.name === name); }
const EXPENSE_CATS = ['Rent','Utilities','Fuel','Salary','Maintenance','Miscellaneous'];
const CASH_TYPES = ['Cash in Hand','Bank Savings','MOMO','Others'];

/* ---------- state ---------- */
let DB = null;
let session = { cashier: null, tel: null, role: null, adminMode: false, sig: null, isCashier2: false };
let cart = [];
let currentView = 'pos';
let priceAdjUnlocked = false;


/* ---------- utils ---------- */
const $ = (id) => document.getElementById(id);
const fmt = (n) => 'GH₵ ' + (Number(n)||0).toLocaleString('en-GH',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtN = (n) => (Number(n)||0).toLocaleString('en-GH',{minimumFractionDigits:2,maximumFractionDigits:2});
const nowISO = () => new Date().toISOString();
const pad = (n) => String(n).padStart(2,'0');
function idStamp(prefix){
  const d = new Date();
  return prefix + d.getFullYear() + pad(d.getMonth()+1) + pad(d.getDate()) + '-' + pad(d.getHours()) + pad(d.getMinutes()) + pad(d.getSeconds());
}
function toast(msg, type='ok'){
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.textContent = msg;
  $('toasts').appendChild(el);
  setTimeout(()=>{ el.remove(); }, 3200);
}
function monthName(m){ return ['','January','February','March','April','May','June','July','August','September','October','November','December'][m]||m; }
function deepClone(o){ return JSON.parse(JSON.stringify(o)); }

/* ---------- persistence ---------- */
function defaultDB(){
  const y = new Date().getFullYear();
  const m = new Date().getMonth()+1;
  return {
    version: APP_VERSION,
    business: deepClone(BUSINESS),
    selectedYear: y,
    selectedMonth: m,
    products: [],          // master product catalog (name, category, uPrice, ...)
    stockRows: [],         // FIFO cost-tier rows: {id, productName, category, year, month, qtyIn, rStock, uCost, qtyOut, uPrice, disc, tSales, profit, aPrice, productId}
    sales: [],             // sale headers
    saleLines: [],         // sale line allocations
    security: deepClone(DEFAULT_SECURITY),
    debtors: [],
    creditors: [],
    depositors: [],
    debtorsMonthly: [],
    creditorsMonthly: [],
    depositorsMonthly: [],
    accountTxns: [],
    cashBalances: { 'Cash in Hand':0, 'Bank Savings':0, 'MOMO':0, 'Others':0 },
    cashLog: [],
    expenses: [],
    kpiHistory: [],
    receipts: [],
    undoLog: [],
    backupHistory: [],
    backupSettings: {
      autoBackupEnabled: false,
      schedule: 'manual',
      keepLocalBackups: 30,
      cloudProvider: 'none',
      cloudConnected: false
    },
    settings: { priceAdjEnabled: false }
  };
}
function loadDB(){
  try{
    const raw = ZEZMS.db.load(DB_KEY);
    if(!raw){ DB = defaultDB(); saveDB(); return; }
    DB = JSON.parse(raw);
    // migrations / guards
    if(!DB.cashBalances) DB.cashBalances = { 'Cash in Hand':0, 'Bank Savings':0, 'MOMO':0, 'Others':0 };
    CASH_TYPES.forEach(t=>{ if(DB.cashBalances[t]==null) DB.cashBalances[t]=0; });
    ['products','stockRows','sales','saleLines','debtors','creditors','depositors','debtorsMonthly','creditorsMonthly','depositorsMonthly','accountTxns','cashLog','expenses','kpiHistory','receipts','undoLog','backupHistory'].forEach(k=>{ if(!Array.isArray(DB[k])) DB[k]=[]; });
    if(!DB.backupSettings) DB.backupSettings = { autoBackupEnabled:false, schedule:'manual', keepLocalBackups:30, cloudProvider:'google-drive', cloudConnected:false, googleClientId:'', lastCloudBackupAt:'', lastRestoreAt:'' };
    if(!DB.security) DB.security = deepClone(DEFAULT_SECURITY);
    else {
      if(!Array.isArray(DB.security.cashiers) || !DB.security.cashiers.length) DB.security.cashiers = deepClone(DEFAULT_SECURITY.cashiers);
      if(!DB.security.adminPIN) DB.security.adminPIN = DEFAULT_SECURITY.adminPIN;
      if(!DB.security.pricePIN) DB.security.pricePIN = DEFAULT_SECURITY.pricePIN;
      DB.security.cashiers.forEach(c=>{ if(c.active === undefined) c.active = true; if(!c.id) c.id = 'USR-'+Date.now()+Math.floor(Math.random()*999); });
    }
    // legacy: migrate old cashiers array if present
    if(Array.isArray(DB.cashiers) && DB.cashiers.length && DB.security.cashiers.length === DEFAULT_SECURITY.cashiers.length){
      // keep security as source of truth
    }
    if(!DB.selectedYear) DB.selectedYear = new Date().getFullYear();
    if(!DB.selectedMonth) DB.selectedMonth = new Date().getMonth()+1;
  }catch(e){
    console.error(e);
    DB = defaultDB();
  }
}
function saveDB(){
  ZEZMS.db.save(DB_KEY, DB);
}

/* ---------- KPI engine (exact VBA formulas) ---------- */
function isOpenMonth(){
  const latest = getLatestMonth();
  return DB.selectedYear===latest.year && DB.selectedMonth===latest.month;
}
function getLatestMonth(){
  let y = DB.selectedYear, m = DB.selectedMonth;
  if(DB.stockRows.length){
    let best = {year:0,month:0};
    DB.stockRows.forEach(r=>{
      if(r.year>best.year || (r.year===best.year && r.month>best.month)) best={year:r.year,month:r.month};
    });
    if(best.year) { y=best.year; m=best.month; }
  }
  // also consider sales / expenses dates
  return {year:y, month:m};
}
function KPI_CRStock(){
  return DB.stockRows
    .filter(r=>r.year===DB.selectedYear && r.month===DB.selectedMonth)
    .reduce((s,r)=> s + (Number(r.rStock)||0)*(Number(r.uCost)||0), 0);
}
function KPI_TotalOutstandingDebt(){
  if(isOpenMonth()){
    return DB.debtors.reduce((s,d)=>s+(Number(d.balance)||0),0);
  }
  return DB.debtorsMonthly
    .filter(x=>x.snapYear===DB.selectedYear && x.snapMonth===DB.selectedMonth)
    .reduce((s,x)=>s+(Number(x.closingBalance!=null?x.closingBalance:x.bal)||0),0);
}
function KPI_TotalCreditors(){
  if(isOpenMonth()){
    return DB.creditors.reduce((s,d)=>s+(Number(d.balance)||0),0);
  }
  return DB.creditorsMonthly
    .filter(x=>x.snapYear===DB.selectedYear && x.snapMonth===DB.selectedMonth)
    .reduce((s,x)=>s+(Number(x.closingBalance!=null?x.closingBalance:x.bal)||0),0);
}
function KPI_TotalDeposits(){
  if(isOpenMonth()){
    return DB.depositors.reduce((s,d)=>s+(Number(d.balance)||0),0);
  }
  return DB.depositorsMonthly
    .filter(x=>x.snapYear===DB.selectedYear && x.snapMonth===DB.selectedMonth)
    .reduce((s,x)=>s+(Number(x.closingBalance!=null?x.closingBalance:x.bal)||0),0);
}
function KPI_CashBuckets_Total(){
  return CASH_TYPES.reduce((s,t)=>s+(Number(DB.cashBalances[t])||0),0);
}
function KPI_TotalExpenses_CurrentMonth(){
  return DB.expenses
    .filter(e=>{
      const d = new Date(e.date);
      return d.getFullYear()===DB.selectedYear && (d.getMonth()+1)===DB.selectedMonth;
    })
    .reduce((s,e)=>s+(Number(e.amount)||0),0);
}
function GetGrossProfit_CurrentMonth(){
  return DB.stockRows
    .filter(r=>r.year===DB.selectedYear && r.month===DB.selectedMonth)
    .reduce((s,r)=>s+(Number(r.profit)||0),0);
}
function KPI_NetProfit(){
  return GetGrossProfit_CurrentMonth() - KPI_TotalExpenses_CurrentMonth();
}
function KPI_LiquidCash(){
  return (KPI_CRStock() + KPI_TotalOutstandingDebt() + KPI_CashBuckets_Total())
       - (KPI_TotalCreditors() + KPI_TotalDeposits());
}
function KPI_Zakaat(){
  return KPI_LiquidCash() / 40;
}
function KPI_QtyIn(){
  return DB.stockRows.filter(r=>r.year===DB.selectedYear && r.month===DB.selectedMonth)
    .reduce((s,r)=>s+(Number(r.qtyIn)||0),0);
}
function KPI_QtyOut(){
  return DB.stockRows.filter(r=>r.year===DB.selectedYear && r.month===DB.selectedMonth)
    .reduce((s,r)=>s+(Number(r.qtyOut)||0),0);
}
function KPI_QtyRem(){
  return DB.stockRows.filter(r=>r.year===DB.selectedYear && r.month===DB.selectedMonth)
    .reduce((s,r)=>s+(Number(r.rStock)||0),0);
}
function KPI_TotalSales(){
  return DB.stockRows.filter(r=>r.year===DB.selectedYear && r.month===DB.selectedMonth)
    .reduce((s,r)=>s+(Number(r.tSales)||0),0);
}

/* ---------- auth / roles (Excel ApplyRibbonVisibility) ---------- */
function isElevated(){
  // Muniru (ADMIN login) always elevated; Cashier2 only when Admin Mode ON
  return session.role === 'ADMIN' || !!session.adminMode;
}
function populateLoginCashiers(){
  const sel = $('loginCashier');
  if(!sel) return;
  const list = getCashiers();
  const prev = sel.value;
  sel.innerHTML = list.map(c => {
    const tag = c.role === 'ADMIN' ? 'ADMIN' : 'CASHIER';
    return `<option value="${escAttr(c.name)}">${esc(c.name)} (${tag})</option>`;
  }).join('');
  if(prev && list.some(c=>c.name===prev)) sel.value = prev;
}
function doLogin(){
  const name = $('loginCashier').value;
  const pass = $('loginPass').value;
  const c = getCashierByName(name);
  if(!c || c.password !== pass){
    toast('Incorrect password.', 'err');
    return;
  }
  session.cashier = c.name;
  session.tel = c.tel;
  session.role = c.role;
  session.sig = c.sig;
  session.isCashier2 = (c.role !== 'ADMIN');
  // Excel: Muniru starts Admin Mode ON; Cashier2 starts OFF
  session.adminMode = (c.role === 'ADMIN');
  priceAdjUnlocked = false;
  cart = [];
  $('loginScreen').style.display = 'none';
  $('appShell').style.display = 'flex';
  updateUserBadge();
  applyRoleUI();
  updatePeriodUI();
  // Excel ForceSaleOutLanding
  nav('pos');
  toast('Welcome, ' + c.name.split(' ')[0] + '!');
}
function doLogout(){
  session = { cashier:null, tel:null, role:null, adminMode:false, sig:null, isCashier2:false };
  cart = [];
  priceAdjUnlocked = false;
  $('appShell').style.display = 'none';
  $('loginScreen').style.display = 'flex';
  $('loginPass').value = '';
}
function requireAdmin(msg){
  if(isElevated()) return true;
  toast(msg || 'Only admin can perform this action.', 'err');
  return false;
}
function updateUserBadge(){
  $('uiUserName').textContent = session.cashier || '—';
  const elevated = isElevated();
  if(session.isCashier2 && session.adminMode){
    $('uiUserRole').textContent = 'CASHIER2 · Admin Mode ON';
    $('uiUserRole').className = 'badge admin';
  } else if(session.role === 'ADMIN'){
    $('uiUserRole').textContent = 'ADMIN';
    $('uiUserRole').className = 'badge admin';
  } else {
    $('uiUserRole').textContent = 'CASHIER 2';
    $('uiUserRole').className = 'badge cashier';
  }
}
function applyRoleUI(){
  const elevated = isElevated();
  // Hide admin-only nav items for locked Cashier2
  document.querySelectorAll('[data-admin-only]').forEach(el=>{
    el.style.display = elevated ? '' : 'none';
  });
  // Receipts always visible (Cashier2: own+today filter inside view)
  const admBtn = $('navAdminMode');
  if(admBtn){
    // Excel: Admin Mode button always visible for both
    admBtn.style.display = '';
    if(session.role === 'ADMIN' && !session.isCashier2){
      // Muniru is always admin; button still toggles visual but stays ON by default
      admBtn.textContent = session.adminMode ? '🔐 Admin Mode (ON)' : '🔐 Admin Mode (OFF)';
    } else {
      admBtn.textContent = session.adminMode ? '🔐 Admin Mode (ON)' : '🔐 Admin Mode (OFF)';
    }
    admBtn.style.background = session.adminMode ? 'rgba(0,150,0,.25)' : '';
    admBtn.style.color = session.adminMode ? '#86efac' : '';
  }
  updateUserBadge();
}
function toggleAdminModeBtn(){
  if(session.adminMode){
    // Turning OFF
    session.adminMode = false;
    // Excel: when Cashier2 turns off, force Sale Out landing
    applyRoleUI();
    toast('Admin Mode (OFF)');
    nav('pos');
    return;
  }
  // Turning ON — require PIN (Excel frmAdminPIN)
  promptPIN('Admin Mode PIN', getAdminPIN(), ()=>{
    session.adminMode = true;
    applyRoleUI();
    toast('Admin Mode (ON)');
    // Excel ForceSaleOutLanding after toggle
    nav('pos');
  });
}
function promptPIN(title, expected, onOk){
  openModal(`
    <h3>${title}</h3>
    <div class="field"><label>PIN</label><input id="pinInput" type="password" inputmode="numeric" maxlength="12" /></div>
    <div class="row">
      <button class="btn" onclick="(__pinOk&&__pinOk())">Confirm</button>
      <button class="btn ghost" onclick="closeModal()">Cancel</button>
    </div>
  `);
  window.__pinOk = ()=>{
    const v = document.getElementById('pinInput').value;
    if(v !== expected){
      toast('Incorrect PIN!', 'err');
      return;
    }
    closeModal();
    onOk();
  };
  setTimeout(()=>{ const el=document.getElementById('pinInput'); if(el) el.focus(); }, 50);
}

const TITLES = {
  dashboard:'Dashboard KPIs', pos:'Sale Out', stockin:'Stock In', products:'Products',

  receipts:'Receipt Register', monthend:'Start New Month', reports:'Reports',

const CASHIER2_ALLOWED = new Set(['pos','receipts']);
function nav(view){
  // Hard gate — Excel Cashier2 locked ribbon
  if(!isElevated() && !CASHIER2_ALLOWED.has(view)){
    const msgs = {
      dashboard: 'Only admin can view KPI dashboard.',
      stockin: 'Only ADMIN can perform Stock In.',
      monthend: 'Only admin can start a New Month.',
      expenses: 'Only admin can access Expenses.',
      accounts: 'Only admin can access Accounts.',
      cash: 'Only admin can access Cash Balances.',
      reports: 'Only admin can view reports.',
      products: 'Only admin can manage products.',
      stock: 'Only admin can view Stock Balance.',
      sync: 'Only admin can access Sync / Backup.',
      settings: 'Only admin can access Settings.'
    };
    toast(msgs[view] || 'Only admin can open this page.', 'err');
    view = 'pos';
  }
  currentView = view;
  document.querySelectorAll('#mainNav button[data-view]').forEach(b=>{
    b.classList.toggle('active', b.dataset.view===view);
  });
  $('viewTitle').textContent = TITLES[view]||view;
  closeSide();
  render();
}
function toggleSide(){
  $('sidebar').classList.toggle('open');
  $('sideOverlay').classList.toggle('show');
}
function closeSide(){
  $('sidebar').classList.remove('open');
  $('sideOverlay').classList.remove('show');
}

/* ---------- modal ---------- */
function openModal(html){ $('modalBody').innerHTML = html; $('modalBg').classList.add('show'); }
function closeModal(){ $('modalBg').classList.remove('show'); $('modalBody').innerHTML=''; window.__pinOk=null; }

/* ---------- RENDER ---------- */
function render(){
  updatePeriodUI();
  applyRoleUI();
  // Safety: if locked cashier somehow on admin view, bounce to pos
  if(!isElevated() && !CASHIER2_ALLOWED.has(currentView)){
    currentView = 'pos';
    $('viewTitle').textContent = TITLES.pos;
  }
  const root = $('viewRoot');
  switch(currentView){
    case 'dashboard': root.innerHTML = viewDashboard(); break;
    case 'pos': root.innerHTML = viewPOS(); bindPOS(); break;
    case 'stockin': root.innerHTML = viewStockIn(); break;
    case 'products': root.innerHTML = viewProducts(); break;
    case 'stock': root.innerHTML = viewStock(); break;
    case 'cash': root.innerHTML = viewCash(); break;
    case 'expenses': root.innerHTML = viewExpenses(); break;
    case 'accounts': root.innerHTML = viewAccounts(); break;
    case 'receipts': root.innerHTML = viewReceipts(); break;
    case 'monthend': root.innerHTML = viewMonthEnd(); break;
    case 'reports': root.innerHTML = viewReports(); break;
    case 'sync': root.innerHTML = viewSync(); break;
    case 'settings': root.innerHTML = viewSettings(); break;
    default: root.innerHTML = '<div class="empty">Unknown view</div>';
  }
}

function stockOnHand(name){
  // Excel GetRemainingQty / GetTotalAvailableForSale — latest open stock month
  const lm = getLatestMonth();
  return DB.stockRows
    .filter(r=>r.productName===name && r.year===lm.year && r.month===lm.month)
    .reduce((s,r)=>s+(Number(r.rStock)||0),0);
}
function getBaseUnitPrice(name){
  const lm = getLatestMonth();
  // Prefer latest stock row uPrice in open month, else product catalog
  const rows = DB.stockRows.filter(r=>r.productName===name && r.year===lm.year && r.month===lm.month);
  if(rows.length){
    // most recent by id
    const r = rows[rows.length-1];
    if(r.uPrice!=null) return Number(r.uPrice)||0;
  }
  const p = DB.products.find(x=>x.name===name);
  return p ? (Number(p.uPrice)||0) : 0;
}
function addProduct(){
  const name = ($('pName').value||'').trim();
  const category = ($('pCat').value||'').trim();
  const uPrice = Number($('pPrice').value)||0;
  if(!name){ toast('Product name required','err'); return; }
  if(DB.products.some(p=>p.name.toLowerCase()===name.toLowerCase())){
    toast('Product already exists','warn'); return;
  }
  DB.products.push({ id:'PRD-'+Date.now(), name, category, uPrice });
  saveDB(); toast('Product saved'); render();
}
function editProduct(i){
  const p = DB.products[i];
  openModal(`<h3>Edit product</h3>
    <div class="field"><label>Name</label><input id="epName" value="${escAttr(p.name)}" /></div>
    <div class="field"><label>Category</label><input id="epCat" value="${escAttr(p.category||'')}" /></div>
    <div class="field"><label>Unit price</label><input id="epPrice" type="number" step="0.01" value="${p.uPrice}" /></div>
    <div class="row"><button class="btn" onclick="saveEditProduct(${i})">Save</button>
    <button class="btn ghost" onclick="closeModal()">Cancel</button></div>`);
}
function saveEditProduct(i){
  const name = document.getElementById('epName').value.trim();
  if(!name){ toast('Name required','err'); return; }
  const old = DB.products[i].name;
  DB.products[i].name = name;
  DB.products[i].category = document.getElementById('epCat').value.trim();
  DB.products[i].uPrice = Number(document.getElementById('epPrice').value)||0;
  if(old!==name){
    DB.stockRows.forEach(r=>{ if(r.productName===old) r.productName=name; });
  }
  saveDB(); closeModal(); toast('Updated'); render();
}
function delProduct(i){
  if(!confirm('Delete this product from catalog? Stock rows are kept.')) return;
  DB.products.splice(i,1); saveDB(); render();
}

        <div class="field" style="flex:1"><label>Unit Cost (GH₵)</label><input id="siCost" type="number" min="0" step="0.01" value="0" /></div>
        <div class="field" style="flex:1"><label>Unit Price (GH₵)</label><input id="siPrice" type="number" min="0" step="0.01" value="0" /></div>
      </div>
      <div class="row">
        <div class="field" style="flex:1"><label>Year</label><input id="siYear" type="number" value="${DB.selectedYear}" /></div>
        <div class="field" style="flex:1"><label>Month</label><input id="siMonth" type="number" min="1" max="12" value="${DB.selectedMonth}" /></div>
      </div>
      <button class="btn" onclick="doStockIn()">Record Stock In</button>
      <p class="muted" style="font-size:12px;margin-top:10px">Same product + same unit cost in the open month merges into one FIFO batch row (Excel AddOrUpdateTransaction).</p>
    </div>
    <div class="card">
      <h3>Recent stock rows</h3>
      <div class="table-wrap"><table>
        <thead><tr><th>Period</th><th>Product</th><th class="right">Qty In</th><th class="right">U Cost</th><th class="right">R Stock</th></tr></thead>
        <tbody>${recent}</tbody>
      </table></div>
    </div>
  </div>`;
}
function doStockIn(){
  if(session.role!=='ADMIN' && !session.adminMode){
    toast('Only ADMIN can perform Stock In.','err'); return;
  }
  let name = ($('siProduct').value||'').trim() || ($('siNewName').value||'').trim();
  const category = ($('siCat').value||'').trim();
  const qty = Number($('siQty').value)||0;
  const uCost = Number($('siCost').value)||0;
  let uPrice = Number($('siPrice').value)||0;
  const year = Number($('siYear').value)||DB.selectedYear;
  const month = Number($('siMonth').value)||DB.selectedMonth;
  if(!name){ toast('Product required','err'); return; }
  if(qty<=0){ toast('Qty must be > 0','err'); return; }
  // catalog
  let prod = DB.products.find(p=>p.name.toLowerCase()===name.toLowerCase());
  if(!prod){
    prod = { id:'PRD-'+Date.now(), name, category, uPrice: uPrice||0 };
    DB.products.push(prod);
  } else {
    name = prod.name;
    if(uPrice<=0) uPrice = prod.uPrice||0;
    if(category && !prod.category) prod.category = category;
  }
  // merge same cost batch in month
  let row = DB.stockRows.find(r=>
    r.productName===name && r.year===year && r.month===month && Number(r.uCost)===uCost
  );
  if(row){
    row.qtyIn = (Number(row.qtyIn)||0) + qty;
    row.rStock = (Number(row.rStock)||0) + qty;
    if(uPrice>0) row.uPrice = uPrice;
  } else {
    DB.stockRows.push({
      id: idStamp('STKIN-'),
      productId: prod.id,
      productName: name,
      category: category || prod.category || '',
      year, month,
      qtyIn: qty,
      rStock: qty,
      uCost,
      qtyOut: 0,
      uPrice: uPrice || prod.uPrice || 0,
      disc: 0,
      tSales: 0,
      profit: 0,
      aPrice: 0
    });
  }
  DB.undoLog.push({ row: name, product:name, type:'STOCK_IN', qty, disc:0, at:nowISO(), batchId:idStamp('STKIN-'), cashier:session.cashier });
  saveDB(); toast('Stock In recorded: '+qty+' × '+name); render();
}

/* ===== STOCK BALANCE ===== */
function viewStock(){
  const map = {};
  DB.stockRows.filter(r=>r.year===DB.selectedYear && r.month===DB.selectedMonth).forEach(r=>{
    const k = r.productName;
    if(!map[k]) map[k] = { name:k, cat:r.category, qty:0, value:0, tiers:[] };
    map[k].qty += Number(r.rStock)||0;
    map[k].value += (Number(r.rStock)||0)*(Number(r.uCost)||0);
    if((Number(r.rStock)||0)>0) map[k].tiers.push({cost:r.uCost, qty:r.rStock});
  });

  </tr>`).join('') || `<tr><td colspan="5" class="empty">No stock in ${monthName(DB.selectedMonth)} ${DB.selectedYear}</td></tr>`;
  return periodSelectorHTML() + `<div class="card">
    <div class="row" style="justify-content:space-between;margin-bottom:8px">

      <span class="pill">CR value: <b class="mono">${fmt(KPI_CRStock())}</b></span>

}

function onPosSearch(){
  const q = ($('posSearch').value||'').trim().toLowerCase();
  const box = $('posSuggest');
  if(!box) return;
  if(!q){ box.classList.remove('show'); box.innerHTML=''; return; }
  const names = [...new Set([
    ...DB.products.map(p=>p.name),
    ...DB.stockRows.map(r=>r.productName)
  ])].filter(Boolean);
  // Excel ranked: starts-with=1, word-start=2, contains=3
  const scored = [];
  names.forEach(n=>{
    const low = n.toLowerCase();
    const pos = low.indexOf(q);
    if(pos < 0) return;
    let score = 3;
    if(pos === 0) score = 1;
    else if(low[pos-1] === ' ') score = 2;
    scored.push({n, score});
  });
  scored.sort((a,b)=> a.score-b.score || a.n.localeCompare(b.n));
  if(!scored.length){
    box.innerHTML = '<div class="none">No matching items</div>';
    box.classList.add('show');
    return;
  }
  box.innerHTML = scored.slice(0,12).map(x=>`<div onclick="pickProduct('${escAttr(x.n).replace(/'/g,"&#39;")}')">${esc(x.n)}</div>`).join('');
  box.classList.add('show');
}

  if(e.key === 'Enter'){

    const b = $('posSuggest');
    const first = b && b.querySelector('div:not(.none)');
    if(first) first.click();
  }

/** Excel AddItemToList */
function addItemToList(){
  const name = (($('posProduct')&&$('posProduct').value)||'').trim();
  if(!name){ toast('Select a product.', 'err'); return; }

  // Must exist in product list / stock history (Excel ProductList)
  const known = DB.products.some(p=>p.name.toLowerCase()===name.toLowerCase())
    || DB.stockRows.some(r=>r.productName.toLowerCase()===name.toLowerCase());
  if(!known){
    toast("The product '"+name+"' does not exist in stock.\nPlease add it first via Stock In.", 'err');
    return;
  }

  const qty = Number($('posQty').value)||0;
  if(qty <= 0){ toast('Quantity must be > 0.', 'err'); return; }

  const base = Number($('posUPrice').value)||0;
  const adj = Number($('posPriceAdj').value)||0;
  // Excel: if adj field used without unlock and non-zero, block
  if(Math.abs(adj) > 1e-9 && !priceAdjUnlocked){
    toast('Price adjustment is locked. Double-click Price adj and enter PIN 0000.', 'warn');
    return;
  }
  const uPrice = base + adj; // effective
  const disc = Number($('posDisc').value)||0;

  const avail = stockOnHand(name);
  const already = cart.filter(c=>c.name===name).reduce((s,c)=>s+c.qty, 0);
  if(already + qty > avail + 1e-9){
    toast("Cannot add "+qty+" units of '"+name+"'.\nAvailable stock (current month): "+avail+"\nAlready in this sale: "+already, 'err');
    return;
  }

  const lineTotal = round2(qty * uPrice - disc);
  cart.push({ name, qty, uPrice, basePrice: base, adj, disc, lineTotal });
  // lock adj again after add (Excel Exit locks)
  priceAdjUnlocked = false;
  clearProductEntry();
  render(); // refresh list
  toast('Item added');
}

/** Excel RecordSaleOut_FIFO — do NOT overwrite base uPrice (M); update Q A PRICE */
function recordSaleOutFIFO(productName, qty, uPrice, disc){
  const lm = getLatestMonth();
  // snapshot for rollback
  const rows = DB.stockRows
    .filter(r => r.productName === productName && r.year===lm.year && r.month===lm.month
      && ((Number(r.qtyIn)||0) - (Number(r.qtyOut)||0) > 0 || (Number(r.rStock)||0) > 0));

  // normalize remaining
  let totalAvailable = 0;
  rows.forEach(r=>{
    const rem = (r.rStock != null) ? Number(r.rStock) : (Number(r.qtyIn)||0)-(Number(r.qtyOut)||0);
    r._rem = rem;
    if(rem > 0) totalAvailable += rem;
  });
  if(totalAvailable < qty - 1e-9){
    throw new Error('Not enough stock available for "'+productName+'".\nRequested: '+qty+', Available: '+totalAvailable);
  }

  let qtyRemaining = qty;
  const qtyTotal = qty;
  let discAllocated = 0;
  const allocated = [];

  while(qtyRemaining > 1e-9){
    // lowest unit cost among remaining
    let best = null;
    DB.stockRows.forEach(r=>{
      if(r.productName !== productName || r.year!==lm.year || r.month!==lm.month) return;
      const rem = (r.rStock != null) ? Number(r.rStock) : (Number(r.qtyIn)||0)-(Number(r.qtyOut)||0);
      if(rem <= 0) return;
      if(!best || Number(r.uCost) < Number(best.uCost)) best = r;
    });
    if(!best) throw new Error('FIFO allocation failed for '+productName);

    const rem = (best.rStock != null) ? Number(best.rStock) : (Number(best.qtyIn)||0)-(Number(best.qtyOut)||0);
    const thisQty = Math.min(qtyRemaining, rem);

    let rowDisc = 0;
    if(disc && qtyTotal > 0){
      if(qtyRemaining - thisQty <= 1e-9) rowDisc = disc - discAllocated;
      else rowDisc = disc * (thisQty / qtyTotal);
    }
    discAllocated += rowDisc;

    const basePrice = Number(best.uPrice)||0; // original M — do not overwrite
    const adjValue = (uPrice - basePrice) * thisQty;

    best.qtyOut = (Number(best.qtyOut)||0) + thisQty;
    best.rStock = rem - thisQty;
    best.disc = (Number(best.disc)||0) + rowDisc;
    // T Sales uses effective uPrice cumulative style simplified:
    const chunkSales = thisQty * uPrice - rowDisc;
    best.tSales = (Number(best.tSales)||0) + chunkSales;
    const chunkCost = thisQty * (Number(best.uCost)||0);
    best.profit = (Number(best.profit)||0) + (chunkSales - chunkCost);
    if(adjValue) best.aPrice = (Number(best.aPrice)||0) + adjValue;
    // DO NOT overwrite best.uPrice (Excel: leave original stock price)

    DB.undoLog.push({
      row: best.id, product: productName, type: 'Sale Out',
      qty: thisQty, disc: rowDisc, at: nowISO(),
      batchId: '', cashier: session.cashier
    });

    allocated.push({ stockRowId: best.id, qty: thisQty, uCost: best.uCost, sales: chunkSales, disc: rowDisc, aPrice: adjValue });
    qtyRemaining -= thisQty;
  }
  return allocated;
}

function getOrCreateDebtorID(debtorName, contact){
  // Excel: match by Trim name only on DEBTORS.B
  const name = (debtorName||'').trim();
  let d = DB.debtors.find(x => (x.name||'').trim() === name);
  if(d) return d.id;
  const id = idStamp('DEB-');
  DB.debtors.push({
    id,
    name,
    contact: contact||'',
    description: 'Auto-created from credit sale',
    balance: 0,
    date: nowISO()
  });
  return id;
}

function resetSaleOutForm(){
  cart = [];
  cart._cust = ''; cart._loc = ''; cart._tel = ''; cart._paid = 0;
  priceAdjUnlocked = false;
}

function quickSaleOut(){
  // Excel cmdQuickSaleOut — FIFO only, no receipt/customer/debtor
  if(!session.cashier){ toast('No active cashier detected. Please login first.', 'err'); return; }
  if(!cart.length){ toast('Please add at least one item for quick sale.', 'err'); return; }
  try{
    cart.forEach(line=>{
      recordSaleOutFIFO(line.name, line.qty, line.uPrice, line.disc||0);
    });
  }catch(e){
    loadDB();
    toast(e.message||String(e), 'err');
    return;
  }
  saveDB();
  resetSaleOutForm();
  toast('Quick Sale Out recorded');
  render();
}

function printReceiptSale(){
  // Excel cmdPrintReceipt order
  if(!session.cashier){ toast('No active cashier detected. Please login first.', 'err'); return; }
  if(!cart.length){ toast('No items added.', 'err'); return; }
  const customer = (($('posCust')&&$('posCust').value)||cart._cust||'').trim();
  const location = (($('posLoc')&&$('posLoc').value)||cart._loc||'').trim();
  const tel = (($('posTel')&&$('posTel').value)||cart._tel||'').trim();
  if(!customer){ toast('Customer required.', 'err'); return; }
  if(!tel){ toast('Customer Tel required.', 'err'); return; }

  const subtotal = cartSubtotal();
  const totalWithVAT = round2(subtotal + subtotal * VAT_RATE);
  const amountPaid = Number(($('posAmountPaid')&&$('posAmountPaid').value) || cart._paid || 0);
  const outstanding = round2(totalWithVAT - amountPaid); // for register/debtor
  const receiptBal = round2(amountPaid - totalWithVAT); // for printed receipt

  const receiptNo = idStamp('SR-');
  const items = cart.map(c => ({
    product: c.name,
    qty: c.qty,
    uPrice: c.uPrice,
    disc: c.disc||0,
    total: round2(c.qty*c.uPrice - (c.disc||0))
  }));

  // FIFO first? Excel does Print then FIFO — but if FIFO fails stock is inconsistent.
  // We FIFO first then receipt; on failure abort all.
  let allocations = [];
  try{
    cart.forEach(line=>{
      const alloc = recordSaleOutFIFO(line.name, line.qty, line.uPrice, line.disc||0);
      allocations.push({ line, alloc });
    });
  }catch(e){
    loadDB();
    toast(e.message||String(e), 'err');
    return;
  }

  // Debtor if outstanding > 0
  if(outstanding > 0){
    const debtorID = getOrCreateDebtorID(customer, tel);
    const d = DB.debtors.find(x=>x.id===debtorID);
    d.balance = (Number(d.balance)||0) + outstanding;
    d.date = nowISO();
    if(!d.contact && tel) d.contact = tel;
    logAccountTxn(debtorID, 'Debtor', customer, 'Credit Sale', outstanding, d.balance, receiptNo);
  }

  // Receipt register (Excel LogReceiptToRegister)
  DB.receipts.push({
    receiptNo,
    customerName: customer,
    contact: tel,
    location,
    totalAmount: totalWithVAT,
    amountPaid,
    balance: outstanding > 0 ? outstanding : 0,
    date: nowISO(),
    credit: outstanding > 0,
    cashier: session.cashier,
    cashierTel: session.tel,
    lines: items
  });

  DB.sales.push({
    id: receiptNo,
    receiptNo,
    customer,
    contact: tel,
    location,
    total: totalWithVAT,
    paid: amountPaid,
    balance: outstanding,
    pay: outstanding > 0 ? (amountPaid > 0 ? 'PARTIAL' : 'CREDIT') : 'PAID',
    cashier: session.cashier,
    date: nowISO(),
    year: getLatestMonth().year,
    month: getLatestMonth().month,
    lines: allocations.map(a=>({
      product: a.line.name,
      qty: a.line.qty,
      price: a.line.uPrice,
      disc: a.line.disc||0,
      amount: round2(a.line.qty*a.line.uPrice - (a.line.disc||0)),
      fifo: a.alloc
    }))
  });

  saveDB();
  const saleSnap = {
    receiptNo, customer, location, contact: tel,
    total: totalWithVAT, paid: amountPaid,
    balance: receiptBal, outstanding,
    cashier: session.cashier, cashierTel: session.tel,
    date: nowISO(), lines: items
  };
  resetSaleOutForm();
  toast('Sale recorded · '+receiptNo);
  showReceiptModal(saleSnap);
}

function formatOrdinalDate(d){
  const dt = d instanceof Date ? d : new Date(d);
  const day = dt.getDate();
  const suf = (day%10===1 && day!==11) ? 'st' : (day%10===2 && day!==12) ? 'nd' : (day%10===3 && day!==13) ? 'rd' : 'th';
  return day + suf + ' ' + dt.toLocaleString('en-GB',{month:'long', year:'numeric'});
}

      </table></div>

function adjustCash(type, action, amount, note){
  const before = Number(DB.cashBalances[type])||0;
  let after = before;
  if(action==='Add') after = before + amount;
  else after = before - amount;
  DB.cashBalances[type] = after;
  DB.cashLog.push({
    id: idStamp('CB-'),
    cashType: type,
    action,
    amount,
    before,
    after,
    at: nowISO(),
    cashier: session.cashier,
    note: note||''
  });
}
function doCashMove(){
  const type = $('cbType').value;
  const action = $('cbAction').value;
  const amount = Number($('cbAmt').value)||0;
  const note = ($('cbNote').value||'').trim();
  if(amount<=0){ toast('Amount must be > 0','err'); return; }
  if(action==='Deduct' && amount > (Number(DB.cashBalances[type])||0)+1e-9){
    toast('Insufficient balance in '+type,'err'); return;
  }
  adjustCash(type, action, amount, note);
  saveDB(); toast(action+' '+fmt(amount)+' → '+type); render();
}

function getOrCreateAccount(kind, name, contact, description){
  const list = DB[kind];
  let a = list.find(x=>x.name.toLowerCase()===name.toLowerCase());
  if(a) return a.id;
  const prefix = kind==='debtors'?'DEB-': kind==='creditors'?'CRD-':'DEP-';
  const id = idStamp(prefix);
  list.push({ id, name, contact: contact||'', description: description||'', balance:0, date: nowISO() });
  return id;
}
function addAccount(){
  const name = ($('acName').value||'').trim();
  const contact = ($('acContact').value||'').trim();
  const description = ($('acDesc').value||'').trim();
  const bal = Number($('acBal').value)||0;
  if(!name){ toast('Name required','err'); return; }
  const id = getOrCreateAccount(accTab, name, contact, description);
  const a = DB[accTab].find(x=>x.id===id);
  if(bal){
    a.balance = (Number(a.balance)||0) + bal;
    a.description = description || a.description;
    a.contact = contact || a.contact;
    logAccountTxn(id, accTab.slice(0,-1).toUpperCase(), name, 'OPENING', bal, a.balance, '');
  }
  saveDB(); toast('Account saved'); render();
}
function logAccountTxn(accountID, accountType, name, txnType, amount, balanceAfter, receiptNo){
  DB.accountTxns.push({
    id: idStamp('ATX-'),
    accountID, accountType, name, txnType,
    amount, balanceAfter,
    date: nowISO(),
    receiptNo: receiptNo||'',
    cashier: session.cashier
  });
}
function openSettle(kind, id){
  const a = DB[kind].find(x=>x.id===id);
  if(!a) return;
  openModal(`<h3>Settle · ${esc(a.name)}</h3>
    <p class="muted">Current balance: <b class="mono">${fmt(a.balance)}</b></p>
    <div class="field"><label>Amount (GH₵)</label><input id="stAmt" type="number" min="0" step="0.01" value="${Math.max(0,a.balance)}" /></div>
    <div class="field"><label>Direction</label>
      <select id="stDir">
        <option value="REDUCE">Reduce balance (collect / pay)</option>
        <option value="INCREASE">Increase balance</option>
      </select>
    </div>
    <div class="field"><label>Cash wallet impact</label>
      <select id="stWallet">
        <option value="">— no cash movement —</option>
        ${CASH_TYPES.map(t=>`<option>${t}</option>`).join('')}
      </select>
    </div>
    <div class="field"><label>Note</label><input id="stNote" /></div>
    <div class="row">
      <button class="btn" onclick="applySettle('${kind}','${id}')">Apply</button>
      <button class="btn ghost" onclick="closeModal()">Cancel</button>
    </div>`);
}
function applySettle(kind, id){
  const a = DB[kind].find(x=>x.id===id);
  if(!a) return;
  const amt = Number(document.getElementById('stAmt').value)||0;
  const dir = document.getElementById('stDir').value;
  const wallet = document.getElementById('stWallet').value;
  const note = document.getElementById('stNote').value||'';
  if(amt<=0){ toast('Amount required','err'); return; }
  const signed = dir==='REDUCE' ? -amt : amt;
  const before = Number(a.balance)||0;
  a.balance = before + signed;
  a.date = nowISO();
  // cash side effects (common shop sense)
  if(wallet){
    if(kind==='debtors' && dir==='REDUCE'){
      // collected from debtor → cash in
      adjustCash(wallet, 'Add', amt, 'Debtor settle '+a.name);
    } else if(kind==='creditors' && dir==='REDUCE'){
      // paid creditor → cash out
      if(amt > (Number(DB.cashBalances[wallet])||0)+1e-9){ toast('Insufficient wallet','err'); a.balance=before; return; }
      adjustCash(wallet, 'Deduct', amt, 'Creditor pay '+a.name);
    } else if(kind==='depositors' && dir==='REDUCE'){
      // return deposit → cash out
      if(amt > (Number(DB.cashBalances[wallet])||0)+1e-9){ toast('Insufficient wallet','err'); a.balance=before; return; }
      adjustCash(wallet, 'Deduct', amt, 'Deposit return '+a.name);
    } else if(kind==='depositors' && dir==='INCREASE'){
      adjustCash(wallet, 'Add', amt, 'Deposit in '+a.name);
    }
  }
  logAccountTxn(id, kind.slice(0,-1).toUpperCase(), a.name, dir==='REDUCE'?'SETTLE':'INCREASE', signed, a.balance, note);
  saveDB(); closeModal(); toast('Settlement posted'); render();
}

function confirmMonthEnd(){
  promptPIN('Admin PIN required', getAdminPIN(), ()=> startNewMonth());
}
function snapshotAccounts(kind, monthlyKey, year, month){
  DB[kind].forEach(a=>{
    DB[monthlyKey].push({
      id: a.id,
      name: a.name,
      phone: a.contact||'',
      snapYear: year,
      snapMonth: month,
      bal: Number(a.balance)||0,
      closingBalance: Number(a.balance)||0
    });
  });
}
function startNewMonth(){
  const oldY = DB.selectedYear, oldM = DB.selectedMonth;
  const year = Number($('meYear').value);
  const month = Number($('meMonth').value);
  if(!year || month<1 || month>12){ toast('Invalid period','err'); return; }
  // prevent dup carry if rows already exist
  const exists = DB.stockRows.some(r=>r.year===year && r.month===month);
  if(exists && !confirm('Stock rows already exist for that month. Continue and add carry-over rows?')) return;

  // snapshots for closing month
  snapshotAccounts('debtors','debtorsMonthly', oldY, oldM);
  snapshotAccounts('creditors','creditorsMonthly', oldY, oldM);
  snapshotAccounts('depositors','depositorsMonthly', oldY, oldM);

  // KPI history
  DB.kpiHistory.push({
    year: oldY, month: oldM,
    qtyIn: KPI_QtyIn(), qtyOut: KPI_QtyOut(), qtyRem: KPI_QtyRem(),
    gross: GetGrossProfit_CurrentMonth(),
    net: KPI_NetProfit(),
    liquidCash: KPI_LiquidCash(),
    debt: KPI_TotalOutstandingDebt(),
    creditors: KPI_TotalCreditors(),
    deposits: KPI_TotalDeposits()
  });

  // CarryOverStock: R STOCK > 0 → new month qtyIn/rStock
  const carry = DB.stockRows.filter(r=>r.year===oldY && r.month===oldM && (Number(r.rStock)||0)>0);
  carry.forEach(r=>{
    DB.stockRows.push({
      id: idStamp('STKIN-'),
      productId: r.productId,
      productName: r.productName,
      category: r.category,
      year, month,
      qtyIn: Number(r.rStock)||0,
      rStock: Number(r.rStock)||0,
      uCost: Number(r.uCost)||0,
      qtyOut: 0,
      uPrice: Number(r.uPrice)||0,
      disc: 0, tSales: 0, profit: 0, aPrice: 0,
      carriedFrom: r.id
    });
  });

  DB.selectedYear = year;
  DB.selectedMonth = month;
  saveDB();
  toast(`New month opened: ${monthName(month)} ${year} · carried ${carry.length} batches`);
  nav('dashboard');
}

function importDB(){

  const reader = new FileReader();
  reader.onload = ()=>{

      DB = Object.assign(defaultDB(), data);
      saveDB();
      toast('Import complete');
      render();
    }catch(e){ toast('Import failed: '+e.message,'err'); }
  };
  reader.readAsText(f);
}
